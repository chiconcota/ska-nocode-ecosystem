<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Data Entry Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto" x-data="skaForm('doctor_data')">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-8 py-6">
                <h2 class="text-2xl font-bold text-white flex items-center">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Doctor Data Entry
                </h2>
                <p class="mt-2 text-blue-100 text-sm">Fill in the details below to add a new doctor to the system.</p>
            </div>

            <!-- Form -->
            <form @submit.prevent="submit" class="px-8 py-8 space-y-6">
                <!-- Group 1: Basic Info -->
                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Doctor Name <span class="text-red-500">*</span></label>
                        <input type="text" x-model="fields.doctor_name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Avatar URL</label>
                        <input type="url" x-model="fields.avatar" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border" placeholder="https://...">
                    </div>
                </div>

                <!-- Group 2: Professional Info -->
                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Specialty</label>
                        <input type="text" x-model="fields.specialty" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border" placeholder="e.g. Cardiologist">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Qualifications</label>
                        <input type="text" x-model="fields.qualifications" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border" placeholder="e.g. MBBS, MD">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Experience (Years)</label>
                        <input type="number" x-model="fields.experience" min="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Rating (e.g. 98%)</label>
                        <input type="text" x-model="fields.rating" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border">
                    </div>
                </div>

                <!-- Group 3: Location & Clinic -->
                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">City</label>
                        <input type="text" x-model="fields.city" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Clinic Name</label>
                        <input type="text" x-model="fields.clinic_name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border">
                    </div>
                </div>

                <!-- Group 4: Stats & Pricing -->
                <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Patient Count</label>
                        <input type="text" x-model="fields.patient_count" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border" placeholder="e.g. 5000+">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Consultation Fee ($)</label>
                        <input type="number" step="0.01" x-model="fields.consultation_fee" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Availability Text</label>
                        <input type="text" x-model="fields.availability_text" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-4 py-2 border" placeholder="e.g. Available Today">
                    </div>
                </div>

                <!-- Group 5: Toggles -->
                <div class="pt-4 border-t border-gray-200">
                    <div class="flex items-center">
                        <input type="checkbox" x-model="fields.has_guarantee" id="has_guarantee" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="has_guarantee" class="ml-2 block text-sm text-gray-900">
                            Has Guarantee (1/0)
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-6 flex justify-end">
                    <button type="submit" class="inline-flex justify-center rounded-md border border-transparent bg-blue-600 py-3 px-8 text-sm font-medium text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
                        <span x-show="!status.submitting">Save Doctor Record</span>
                        <span x-show="status.submitting" x-cloak>Saving...</span>
                    </button>
                </div>
                
                <!-- Success Message -->
                <div x-show="status.success" x-transition x-cloak class="mt-4 p-4 rounded-md bg-green-50 border border-green-200 flex items-start">
                    <svg class="h-5 w-5 text-green-400 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-green-800">Successfully saved!</h3>
                        <p class="text-sm text-green-700 mt-1" x-text="`Record for ${lastSaved} has been added.`"></p>
                    </div>
                </div>
            </form>
        </div>
    </div>

    
</body>
</html>
