        isLoading: false, 
        message: &#039;&#039;, 
        isSuccess: false,
        formData: {
            ho_ten: &#039;&#039;,
            so_tien_da_chi: 0
        },
        async submitOrder() {
            this.isLoading = true;
            this.message = &#039;&#039;;
            
            try {
                // Ép kiểu số tiền thành integer để chắc chắn SkaFX tính toán đúng toán học
                const payload = {
                    ho_ten: this.formData.ho_ten,
                    so_tien_da_chi: parseFloat(this.formData.so_tien_da_chi)
                };

                const response = await fetch(&#039;/wp-json/ska-logic/v1/submit&#039;, {
                    method: &#039;POST&#039;,
                    headers: {
                        &#039;Content-Type&#039;: &#039;application/json&#039;,
                    },
                    body: JSON.stringify({
                        workflow_id: &#039;test_order_form&#039;, // ID định danh form này để khớp với Trigger Node
                        trigger_data: payload
                    })
                });

                const result = await response.json();

                if (response.ok &amp;&amp; result.success) {
                    this.isSuccess = true;
                    this.message = &#039;Tuyệt vời! Dữ liệu đã được đẩy qua Ska Logic Engine.&#039;;
                    this.formData.ho_ten = &#039;&#039;;
                    this.formData.so_tien_da_chi = 0;
                } else {
                    this.isSuccess = false;
                    this.message = result.data?.message || &#039;Có lỗi xảy ra khi xử lý luồng.&#039;;
                }
            } catch (error) {
                this.isSuccess = false;
                this.message = &#039;Lỗi kết nối máy chủ.&#039;;
            } finally {
                this.isLoading = false;
            }
        }
     }">

</div>

<template class="ska-container-block  wp-block-ska-builder-container" x-if="message">
<div class="ska-container-block mb-5 p-3 rounded-lg text-sm font-medium wp-block-ska-builder-container" :class="isSuccess ? &#039;bg-green-50 text-green-700 border border-green-200&#039; : &#039;bg-red-50 text-red-700 border border-red-200&#039;" x-text="message">
<p class="ska-text-block  wp-block-ska-builder-text">Thành công</p>
</div>
</template>

<label class="ska-container-block block text-sm font-semibold text-gray-700 mb-1 wp-block-ska-builder-container">
<span class="ska-text-block  wp-block-ska-builder-text">Họ và Tên</span>
</label>

<input class="ska-input-block w-full px-4 py-2 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all wp-block-ska-builder-input" type="text" placeholder="VD: Nguyễn Văn A" required="required" data-test="render-is-working" / x-model="formData.ho_ten">

</div>

<div class="ska-container-block  wp-block-ska-builder-container">
<label class="ska-container-block block text-sm font-semibold text-gray-700 mb-1 wp-block-ska-builder-container">
<span class="ska-text-block  wp-block-ska-builder-text">Số tiền đã chi (VNĐ / USD)</span>
</label>

<input class="ska-input-block w-full px-4 py-2 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-mono wp-block-ska-builder-input" type="number" placeholder="Nhập số tiền..." required="required" data-test="render-is-working" / x-model="formData.so_tien_da_chi" min="0">


<p class="ska-text-block text-xs text-gray-400 mt-1 wp-block-ska-builder-text">Test thử các mốc: 2000, 7500, 15000</p>
</div>

<button type="submit" class="ska-button-block w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-70 disabled:cursor-not-allowed transition-all wp-block-ska-builder-button">Bắn Dữ Liệu Test</button>
</form>
</div>


<p></p>
