<div x-data="{ hovered: false, searching: false, searchQuery: '' }"
    class="min-h-screen bg-gray-50 flex flex-col items-center justify-center px-4 py-16 sm:px-6 sm:py-24 md:grid md:place-items-center lg:px-8">
    <div class="max-w-max mx-auto text-center">
        <main class="sm:flex">
            <p class="text-4xl font-extrabold text-blue-600 sm:text-5xl" x-bind:class="{ 'animate-pulse': hovered }">404
            </p>
            <div class="sm:ml-6">
                <div class="sm:border-l sm:border-gray-200 sm:pl-6">
                    <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight sm:text-5xl">Trang không tồn tại
                    </h1>
                    <p class="mt-3 text-base text-gray-500">Xin lỗi, chúng tôi không thể tìm thấy trang bạn đang yêu
                        cầu.</p>
                </div>

                <!-- Buttons Area -->
                <div class="mt-10 flex space-x-3 sm:border-l sm:border-transparent sm:pl-6 justify-center sm:justify-start"
                    x-show="!searching" x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 scale-90" x-transition:enter-end="opacity-100 scale-100"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-90">
                    <a href="/" @mouseenter="hovered = true" @mouseleave="hovered = false"
                        class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200">
                        Quay lại Trang chủ
                    </a>
                    <button @click="searching = true"
                        class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200">
                        Tìm kiếm
                    </button>
                </div>

                <!-- Search Form Area (Alpine UI Toggle) -->
                <div class="mt-8 sm:border-l sm:border-transparent sm:pl-6" x-show="searching" style="display: none;"
                    x-transition:enter="transition ease-out duration-300 delay-100"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 translate-y-0"
                    x-transition:leave-end="opacity-0 translate-y-4">
                    <form action="/" method="GET" class="flex gap-2">
                        <input type="text" name="s" x-model="searchQuery" placeholder="Nhập từ khóa tìm kiếm..."
                            class="block w-full px-4 py-3 rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border outline-none">
                        <button type="submit"
                            class="inline-flex items-center px-4 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-gray-900 hover:bg-gray-800 focus:outline-none transition-colors">
                            Tìm
                        </button>
                        <button type="button" @click="searching = false; searchQuery = ''"
                            class="inline-flex items-center px-3 py-3 border border-gray-300 text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-colors">
                            Hủy
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
